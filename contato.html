<!DOCTYPE html>
<html lang="pt-BR" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato | A&C Investimentos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { theme: { extend: { colors: { gold: '#C5A059', emerald: '#064E3B', dark: '#0A0A0A' } } } }
    </script>
</head>
<body class="bg-dark text-gray-300 font-sans selection:bg-gold selection:text-white">
    <div class="fixed inset-0 z-0 bg-cover bg-center bg-no-repeat" style="background-image: url('https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?q=80&w=1920&auto=format&fit=crop');"></div>
    <div class="fixed inset-0 z-0 bg-black/85"></div>
    
    <div class="relative z-10 min-h-screen flex flex-col">
        <nav class="p-8 flex justify-between items-center px-12 border-b border-gray-900 bg-black/40">
            <div class="flex gap-8 text-sm uppercase tracking-widest text-gold">
                <a href="index.html" class="hover:text-white transition">Início</a>
                <a href="quem-somos.html" class="hover:text-white transition">Quem Somos</a>
                <a href="contato.html" class="text-white border-b border-gold">Contato</a>
            </div>
            <a href="portal.html" class="bg-gold text-black px-6 py-2 font-bold hover:bg-yellow-700 transition uppercase tracking-widest text-sm">Área do Cliente</a>
        </nav>

        <main class="flex-grow max-w-2xl mx-auto py-20 px-6 w-full">
            <h2 class="text-4xl font-serif text-white mb-10 text-center">Fale com um Especialista</h2>
            <div class="bg-gray-900/90 backdrop-blur-sm p-8 rounded-lg border border-gray-800 shadow-xl">
                <form id="contactForm" class="space-y-6">
                    <div><label class="block text-xs uppercase tracking-widest text-gold mb-2">Nome</label><input type="text" id="nome" required class="w-full bg-black/50 p-4 border border-gray-700 focus:border-gold outline-none text-white transition"></div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div><label class="block text-xs uppercase tracking-widest text-gold mb-2">E-mail</label><input type="email" id="email" required class="w-full bg-black/50 p-4 border border-gray-700 focus:border-gold outline-none text-white transition"></div>
                        <div><label class="block text-xs uppercase tracking-widest text-gold mb-2">Telefone</label><input type="tel" id="telefone" required class="w-full bg-black/50 p-4 border border-gray-700 focus:border-gold outline-none text-white transition"></div>
                    </div>
                    <div><label class="block text-xs uppercase tracking-widest text-gold mb-2">Mensagem</label><textarea id="mensagem" required class="w-full bg-black/50 p-4 border border-gray-700 focus:border-gold outline-none text-white h-32 transition"></textarea></div>
                    <button type="button" onclick="enviarWhatsApp()" class="w-full bg-gold hover:bg-yellow-700 text-black font-bold py-4 transition duration-300 uppercase tracking-widest">Enviar Mensagem</button>
                </form>
            </div>
        </main>
        
        <footer class="py-10 text-center border-t border-gray-900 text-xs text-gray-600 bg-black/40">
            &copy; 2026 Haubitz. Todos os direitos reservados. | Desenvolvido por <a href="https://wa.me/5514991159546?text=Olá%20eu%20visitei%20o%20site%20A%26C%20Investimentos%20e%20queria%20saber%20como%20faço%20para%20ter%20meu%20próprio%20site" class="text-gold hover:underline">Haubitz</a>
        </footer>
    </div>
    <script>
        function enviarWhatsApp() {
            const nome = document.getElementById('nome').value;
            const email = document.getElementById('email').value;
            const telefone = document.getElementById('telefone').value;
            const mensagem = document.getElementById('mensagem').value;
            if(!nome || !email || !telefone || !mensagem) { alert("Preencha todos os campos."); return; }
            const texto = `Olá, meu nome é ${nome}.%0AEmail: ${email}%0ATelefone: ${telefone}%0A%0AMensagem:%0A${mensagem}`;
            window.open(`https://wa.me/557199184444?text=${texto}`, '_blank');
        }
    </script>
</body>
</html>
