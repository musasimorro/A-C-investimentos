<!DOCTYPE html>
<html lang="pt-BR">
<head><meta charset="UTF-8"><script src="https://cdn.tailwindcss.com"></script><title>Contato | A&C Investimentos</title></head>
<body class="bg-dark text-gray-300 font-sans">
    <div class="fixed inset-0 z-0 bg-cover bg-center bg-no-repeat opacity-20" style="background-image: url('https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?q=80&w=1920&auto=format&fit=crop');"></div>
    <div class="relative z-10 min-h-screen flex flex-col">
        <nav class="p-8 flex justify-between items-center px-12 text-sm uppercase tracking-widest text-gold border-b border-gray-900 bg-black/40">
            <div class="flex gap-8">
                <a href="index.html" class="hover:text-white transition">Início</a>
                <a href="quem-somos.html" class="hover:text-white transition">Quem Somos</a>
                <a href="contato.html" class="text-white border-b border-gold">Contato</a>
            </div>
            <a href="portal.html" class="bg-gold text-black px-6 py-2 font-bold hover:bg-yellow-700 transition">Área do Cliente</a>
        </nav>
        <main class="flex-grow max-w-2xl mx-auto py-20 px-6 w-full">
            <h2 class="text-4xl font-serif text-white mb-10 text-center">Fale com um Especialista</h2>
            <form id="contactForm" class="space-y-6 bg-gray-900/90 p-8 rounded border border-gray-800">
                <input type="text" id="nome" placeholder="Nome" class="w-full bg-black p-4 border border-gray-700 text-white">
                <input type="email" id="email" placeholder="E-mail" class="w-full bg-black p-4 border border-gray-700 text-white">
                <input type="tel" id="telefone" placeholder="Telefone" class="w-full bg-black p-4 border border-gray-700 text-white">
                <textarea id="mensagem" placeholder="Mensagem" class="w-full bg-black p-4 border border-gray-700 text-white h-32"></textarea>
                <button type="button" onclick="enviarWhatsApp()" class="w-full bg-gold py-4 font-bold uppercase tracking-widest">Enviar Mensagem</button>
            </form>
        </main>
        <footer class="py-10 text-center border-t border-gray-900 text-xs text-gray-600 bg-black/40">&copy; 2026 Haubitz. | Desenvolvido por <a href="https://wa.me/5514991159546?text=Olá%20eu%20visitei%20o%20site%20A%26C%20Investimentos%20e%20queria%20saber%20como%20faço%20para%20ter%20meu%20próprio%20site" class="text-gold hover:underline">Haubitz</a></footer>
    </div>
    <script>function enviarWhatsApp() { const n=document.getElementById('nome').value; const e=document.getElementById('email').value; const t=document.getElementById('telefone').value; const m=document.getElementById('mensagem').value; window.open(`https://wa.me/557199184444?text=Olá, sou ${n}. Email: ${e}. Tel: ${t}. Mensagem: ${m}`, '_blank'); }</script>
</body>
</html>
