<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plataforma Financeira | A&C Investimentos</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Inter', sans-serif; }
        body { background:#0A0A0A; overflow:hidden; display:flex; height:100vh; color: #d1d5db; }

        /* SIDEBAR PREMIUM */
        .sidebar { width:260px; background:#0A0A0A; border-right:1px solid #1f2937; display:flex; flex-direction:column; padding:30px 20px; }
        .logo { color:#C5A059; font-size:28px; font-weight:bold; margin-bottom:10px; font-family: 'Playfair Display', serif; }
        .subtitle { color:#9ca3af; font-size:12px; margin-bottom:40px; text-transform: uppercase; letter-spacing: 2px; }
        .menu { display:flex; flex-direction:column; gap:10px; }
        .menu a { text-decoration:none; color:#f3f4f6; padding:14px; border-radius:8px; transition:0.3s; border: 1px solid transparent; }
        .menu a:hover { border-color: #C5A059; color: #C5A059; }
        /* Estilo do Botão Login */
        .btn-login { background: #C5A059 !important; color: black !important; font-weight: bold; text-align: center; margin-top: 10px; cursor: pointer; }

        .main { flex:1; display:flex; flex-direction:column; }
        .topbar { height:70px; background:#0A0A0A; border-bottom:1px solid #1f2937; display:flex; align-items:center; justify-content:space-between; padding:0 30px; }
        .iframe-container { flex:1; padding:20px; background:#0A0A0A; }
        .iframe-wrapper { width:100%; height:100%; border-radius:12px; overflow:hidden; border:1px solid #1f2937; background:black; }
        iframe { width:100%; height:100%; border:none; }

        .loader { position:fixed; top:0; left:0; width:100%; height:100%; background:#0A0A0A; display:flex; align-items:center; justify-content:center; z-index:9999; flex-direction:column; color:white; transition:1s; }
        .spinner { width:50px; height:50px; border:4px solid #1f2937; border-top:4px solid #C5A059; border-radius:50%; animation:spin 1s linear infinite; margin-bottom:20px; }
        @keyframes spin { 100% { transform:rotate(360deg); } }
    </style>
</head>
<body>

<div class="loader" id="loader">
    <div class="spinner"></div>
    <h2>A&C Investimentos</h2>
</div>

<div class="sidebar">
    <div class="logo">A&C</div>
    <div class="subtitle">Investimentos</div>
    <div class="menu">
        <a href="index.html">🏠 Início</a>
        <a href="quem-somos.html">👤 Quem Somos</a>
        <a href="contato.html">📞 Contato</a>
        <!-- Botão Login: Abre em nova aba para garantir o carregamento do modal -->
        <a href="https://app.teddy360.com.br/#/store/5032d093-03b4-42d0-b847-e2e5575bfb6f/v2" target="_blank" class="btn-login">🔑 Fazer Login</a>
    </div>
</div>

<div class="main">
    <div class="topbar">
        <div style="font-weight: bold; color: #C5A059;">Plataforma Financeira</div>
        <div style="font-size: 14px;">Bem-vindo, Cliente A&C</div>
    </div>
    <div class="iframe-container">
        <div class="iframe-wrapper">
            <!-- Iframe principal com a loja -->
            <iframe src="https://app.teddy360.com.br/#/store/5032d093-03b4-42d0-b847-e2e5575bfb6f/v2" onload="hideLoader()"></iframe>
        </div>
    </div>
</div>

<script>
    function hideLoader(){
        setTimeout(() => {
            document.getElementById('loader').style.opacity = '0';
            setTimeout(() => { document.getElementById('loader').style.display = 'none'; }, 1000);
        }, 1000);
    }
</script>

</body>
</html>
