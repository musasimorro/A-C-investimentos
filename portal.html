<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal A&C Investimentos</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial;
    }

    body{
      background:#0f172a;
      overflow:hidden;
    }

    .topbar{
      width:100%;
      height:70px;
      background:#111827;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 30px;
      border-bottom:1px solid #1f2937;
    }

    .logo{
      color:#d4af37;
      font-size:24px;
      font-weight:bold;
    }

    .btn{
      background:#d4af37;
      color:black;
      text-decoration:none;
      padding:10px 18px;
      border-radius:10px;
      font-weight:bold;
    }

    iframe{
      width:100%;
      height:calc(100vh - 70px);
      border:none;
    }

  </style>
</head>

<body>

  <div class="topbar">

    <div class="logo">
      A&C Investimentos
    </div>

    <a class="btn" href="/">
      Voltar ao Site
    </a>

  </div>

  <iframe
    src="https://app.teddy360.com.br/#/store/5032d093-03b4-42d0-b847-e2e5575bfb6f/v2">
  </iframe>

</body>
</html>
